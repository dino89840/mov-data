<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Movie Admin Pro</title>
    <style>
        :root {
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #3c4858;
            --accent: #63b3ed;
            --accent-dark: #3182ce;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
            --text-primary: #e2e8f0;
            --text-muted: #a0aec0;
            --border: #4a5568;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 820px;
            margin: auto;
            background: var(--bg-secondary);
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            color: var(--accent);
            font-size: 22px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        #loginGate {
            text-align: center;
            padding: 40px 20px;
        }
        #loginGate h3 { color: var(--accent); margin-bottom: 20px; font-size: 18px; }
        #loginGate input {
            max-width: 300px;
            margin: 0 auto 12px;
            display: block;
        }

        #mainContent { display: none; }

        .section {
            background: var(--bg-tertiary);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
        }

        .section h4 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 15px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
        }

        input, textarea, select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        input::placeholder, textarea::placeholder {
            color: #4a5568;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
            .grid-2 { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-login {
            background: var(--accent-dark);
            color: white;
            width: 100%;
            padding: 13px;
            margin-top: 5px;
        }
        .btn-login:hover { background: #2b6cb0; transform: translateY(-1px); }
        .btn-login:disabled { background: var(--border); cursor: not-allowed; transform: none; }

        .btn-add {
            width: 100%;
            background: var(--success);
            color: white;
            margin-bottom: 10px;
            padding: 13px;
        }
        .btn-add:hover { background: #276749; }
        .btn-add:disabled { background: var(--border); cursor: not-allowed; }

        .btn-save {
            width: 100%;
            background: var(--accent-dark);
            color: white;
            padding: 13px;
        }
        .btn-save:hover { background: #2b6cb0; }
        .btn-save:disabled { background: var(--border); cursor: not-allowed; }

        .btn-logout {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }
        .btn-logout:hover { background: #c53030; }

        .link-card {
            background: #1a365d;
            border: 1px solid #2c5282;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 12px;
            display: none;
        }
        .link-card p { margin-bottom: 6px; color: var(--text-muted); }
        .link-card span { color: #90cdf4; word-break: break-all; }

        .video-link-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .video-link-row input { margin-bottom: 0; }

        .btn-check {
            padding: 11px 16px;
            background: var(--warning);
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
            margin-top: 0;
        }
        .btn-check:hover { background: #b7791f; }
        .btn-check:disabled { background: var(--border); cursor: not-allowed; }

        .check-result {
            display: none;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            font-size: 13px;
        }
        .check-result.show { display: block; }
        .check-result .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }
        .check-result .result-label { color: var(--text-muted); }
        .result-value { font-weight: 700; }
        .result-value.ok { color: #68d391; }
        .result-value.fail { color: #fc8181; }
        .result-value.loading { color: #f6ad55; }
        .check-divider { border: none; border-top: 1px solid var(--border); margin: 5px 0; }

        .status {
            text-align: center;
            margin-top: 14px;
            font-weight: 600;
            min-height: 24px;
            font-size: 14px;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.3s;
            word-break: break-word;
        }

        .saving-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .cat-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }
        .cat-row select { margin-bottom: 0; flex: 1; }

        .movie-count {
            background: var(--accent-dark);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        .admin-header h2 { margin-bottom: 0; flex: 1; text-align: left; }

        .session-info {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGIN GATE -->
    <div id="loginGate">
        <h3>🔐 Movie Admin Panel</h3>
        <label>Admin Password</label>
        <input type="password" id="loginPassInput" placeholder="Password ထည့်ပါ" autocomplete="current-password">
        <button class="btn-login" id="loginBtn">Login</button>
        <div id="loginStatus" class="status"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent">
        <div class="admin-header">
            <h2>🎬 Movie Data Center</h2>
            <button class="btn-logout" id="logoutBtn">🚪 Logout</button>
        </div>

        <div class="section">
            <h4>📂 Category ရွေးချယ်ရန်</h4>
            <div class="cat-row">
                <select id="genreSelect">
                    <option value="">-- Category ရွေးချယ်ပါ --</option>
                </select>
                <span class="movie-count" id="movieCount" style="display:none">0 items</span>
            </div>

            <div class="link-card" id="linkCard">
                <p>📌 Main Raw: <span id="urlMain"></span></p>
                <p>🏠 Home Show: <span id="urlShow"></span></p>
            </div>
        </div>

        <div class="section">
            <h4>➕ Add New Movie</h4>

            <label>Title</label>
            <input type="text" id="mTitle" placeholder="Movie Title" maxlength="200">

            <label>Photos</label>
            <div class="grid-2">
                <input type="text" id="mPhoto1" placeholder="Photo 1 URL" maxlength="500">
                <input type="text" id="mPhoto2" placeholder="Photo 2 URL" maxlength="500">
            </div>

            <label>Video / Download URL</label>
            <div class="video-link-row">
                <input type="text" id="mHD" placeholder="https://... video or download link" maxlength="1000">
                <button class="btn-check" id="checkBtn">🔍 Check</button>
            </div>

            <div class="check-result" id="checkResult">
                <div class="result-row">
                    <span class="result-label">📦 File Size</span>
                    <span class="result-value" id="rSize">—</span>
                </div>
                <hr class="check-divider">
                <div class="result-row">
                    <span class="result-label">⏱️ Duration</span>
                    <span class="result-value" id="rDuration">—</span>
                </div>
            </div>

            <label>Description</label>
            <textarea id="mDesc" rows="4" placeholder="Movie description..." maxlength="5000"></textarea>

            <div class="grid-3">
                <div>
                    <label>Rate</label>
                    <input type="text" id="mRate" placeholder="Auto (6.5~9.5)" maxlength="10">
                </div>
                <div>
                    <label>Year</label>
                    <input type="text" id="mYear" placeholder="Auto (N/A)" maxlength="10">
                </div>
                <div>
                    <label>Duration</label>
                    <input type="text" id="mTime" placeholder="Auto from Check" maxlength="20">
                </div>
            </div>

            <div class="grid-3">
                <div>
                    <label>Quality</label>
                    <input type="text" id="mQuality" placeholder="Auto (HD)" maxlength="20">
                </div>
                <div>
                    <label>File Size</label>
                    <input type="text" id="mSize" placeholder="Auto from Check" maxlength="20">
                </div>
                <div>
                    <label>Tags</label>
                    <input type="text" id="mTags" placeholder="Action, Sci-fi" maxlength="200">
                </div>
            </div>

            <button class="btn-add" id="addBtn">⬆️ Add to Top</button>
        </div>

        <div class="section">
            <h4>✏️ Manual JSON Editor</h4>
            <textarea id="jsonData" rows="12" placeholder="Category ရွေးပြီး Load လုပ်ပါ..." spellcheck="false"></textarea>
            <button class="btn-save" id="saveBtn">💾 Save All Changes</button>
        </div>

        <div id="status" class="status"></div>
        <div class="session-info" id="sessionInfo"></div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ============================================
    // CONFIG
    // ============================================
    const SESSION_KEY = 'mva_session_v2';
    const SESSION_TIMEOUT_MS = 4 * 60 * 60 * 1000; // 4 hours

    // ============================================
    // CATEGORIES
    // ============================================
    const categories = [
        { id: "jav-mmsub", name: "Jav Mmsub" },
        { id: "jav-nosub", name: "Jav Nosub" },
        { id: "usa-mmsub", name: "USA Mmsub" },
        { id: "usa-nosub", name: "USA Nosub" },
        { id: "chinese-mmsub", name: "Chinese Mmsub" },
        { id: "chinese-nosub", name: "Chinese Nosub" },
        { id: "yoteshin", name: "Yoteshin" },
        { id: "slider-movie", name: "🎞️ Slider Movie (Auto)" },
        { id: "jvmmsub-ads", name: "Jvmmsub Ads" },
        { id: "jvnosub-ads", name: "Jvnosub Ads" },
        { id: "usammsub-ads", name: "Usammsub Ads" },
        { id: "usanosub-ads", name: "Usanosub Ads" },
        { id: "chinesemmsub-ads", name: "Chinesemmsub Ads" },
        { id: "chinesenosub-ads", name: "Chinesenosub Ads" },
        { id: "request-movie", name: "Request Movie" },
        { id: "telegram-channel", name: "Telegram Channel" },
        { id: "top-ads", name: "Top Ads" },
        { id: "middle-ads", name: "Middle Ads" },
        { id: "Button-ads", name: "Button Ads" },
        { id: "download-ads", name: "Download Ads" },
        { id: "Searchbar-ads", name: "Searchbar Ads" },
        { id: "Noti-ads", name: "Noti Ads" },
        { id: "Moviedetail-ads", name: "Movie Detail Ads" },
        { id: "Moviedetail-topads", name: "Movie Detail Top Ads" },
        { id: "Moviedetail-buttonads", name: "Movie Detail Button Ads" },
        { id: "Moviedetail-firsttopads", name: "Normalmovie First Top Ads" },
        { id: "Yoteshin-allads", name: "Yoteshin All Detail Ads" },
        { id: "ads-notice", name: "Ads & Notice" }
    ];

    const validGenreIds = new Set(categories.map(c => c.id));

    // ============================================
    // STATE
    // ============================================
    let adminPassword = '';
    let sessionTimer = null;

    // ============================================
    // SESSION (light obfuscation — XSS မှာတော့ မလုံခြုံသေးပေမယ့်
    // localStorage inspect ရုံနဲ့ plaintext မထွက်စေဖို့)
    // ============================================
    function obfuscate(str) {
        try {
            return btoa(encodeURIComponent(str).split('').reverse().join(''));
        } catch(e) { return str; }
    }
    function deobfuscate(str) {
        try {
            return decodeURIComponent(atob(str).split('').reverse().join(''));
        } catch(e) { return ''; }
    }

    function getSession() {
        try {
            const raw = sessionStorage.getItem(SESSION_KEY);
            if (!raw) return null;
            const obj = JSON.parse(raw);
            if (!obj.t || !obj.p) return null;
            if (Date.now() - obj.t > SESSION_TIMEOUT_MS) {
                sessionStorage.removeItem(SESSION_KEY);
                return null;
            }
            return deobfuscate(obj.p);
        } catch(e) { return null; }
    }
    function setSession(pass) {
        try {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({
                p: obfuscate(pass),
                t: Date.now()
            }));
        } catch(e) {}
    }
    function clearSession() {
        try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
    }
    function refreshSessionTimer() {
        if (sessionTimer) clearTimeout(sessionTimer);
        sessionTimer = setTimeout(() => {
            showStatus('⏰ Session expired. Please login again.', '#fc8181');
            doLogout();
        }, SESSION_TIMEOUT_MS);
        updateSessionInfo();
    }
    function updateSessionInfo() {
        const el = document.getElementById('sessionInfo');
        if (el && adminPassword) {
            const expireAt = new Date(Date.now() + SESSION_TIMEOUT_MS);
            el.textContent = `Session active until ${expireAt.toLocaleTimeString()}`;
        }
    }

    // ============================================
    // SAFE FETCH WRAPPER — auto-logout on 401
    // ============================================
    async function apiFetch(url, options) {
        const res = await fetch(url, options);
        if (res.status === 401) {
            // Token invalid → auto logout
            setTimeout(() => {
                showStatus('❌ Session invalid. Please login again.', '#fc8181');
                doLogout();
            }, 100);
        }
        return res;
    }

    // ============================================
    // INPUT VALIDATION
    // ============================================
    function isValidUrl(str) {
        if (!str) return false;
        try {
            const u = new URL(str);
            return u.protocol === 'http:' || u.protocol === 'https:';
        } catch(e) { return false; }
    }

    // ============================================
    // DOM READY
    // ============================================
    document.addEventListener('DOMContentLoaded', init);

    function init() {
        // Populate categories
        const sel = document.getElementById('genreSelect');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.textContent = cat.name;
            sel.appendChild(opt);
        });

        // Event listeners (no inline onclick — CSP friendly)
        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.getElementById('logoutBtn').addEventListener('click', doLogout);
        document.getElementById('checkBtn').addEventListener('click', checkAll);
        document.getElementById('addBtn').addEventListener('click', addToJson);
        document.getElementById('saveBtn').addEventListener('click', saveAll);
        document.getElementById('genreSelect').addEventListener('change', loadData);

        document.getElementById('loginPassInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('mHD').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); checkAll(); }
        });

        // Restore session
        const savedPass = getSession();
        if (savedPass) {
            showMain(savedPass);
        }
    }

    // ============================================
    // LOGIN / LOGOUT
    // ============================================
    async function doLogin() {
        const passInput = document.getElementById('loginPassInput');
        const loginBtn = document.getElementById('loginBtn');
        const pass = passInput.value;

        if (!pass) {
            showLoginStatus('Password ထည့်ပါ', '#fc8181');
            return;
        }

        loginBtn.disabled = true;
        showLoginStatus('Verifying...', '#f6ad55');

        try {
            // ads-notice ကို probe — admin pass မှန်ရင် 200 ပြန်မယ်
            const res = await fetch(`/api?genre=ads-notice&pass=${encodeURIComponent(pass)}`, {
                cache: 'no-store'
            });

            if (res.ok) {
                setSession(pass);
                showMain(pass);
                showLoginStatus('', '');
                passInput.value = '';
            } else if (res.status === 429) {
                showLoginStatus('Too many attempts. Please wait 15 minutes.', '#fc8181');
                passInput.value = '';
            } else if (res.status === 401) {
                showLoginStatus('Password မှားနေပါသည်', '#fc8181');
                passInput.value = '';
            } else {
                showLoginStatus(`Error (${res.status})`, '#fc8181');
            }
        } catch (e) {
            showLoginStatus('Connection error. Please try again.', '#fc8181');
        } finally {
            loginBtn.disabled = false;
        }
    }

    function showMain(pass) {
        adminPassword = pass;
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        refreshSessionTimer();
    }

    function doLogout() {
        clearSession();
        adminPassword = '';
        if (sessionTimer) { clearTimeout(sessionTimer); sessionTimer = null; }
        document.getElementById('loginGate').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginPassInput').value = '';
        document.getElementById('jsonData').value = '';
        document.getElementById('genreSelect').value = '';
        document.getElementById('linkCard').style.display = 'none';
        document.getElementById('movieCount').style.display = 'none';
        document.getElementById('sessionInfo').textContent = '';
        showLoginStatus('Logged out', '#68d391');
    }

    function showLoginStatus(msg, color) {
        const el = document.getElementById('loginStatus');
        el.textContent = msg;
        el.style.color = color;
    }

    // ============================================
    // LOAD DATA
    // ============================================
    async function loadData() {
        const genre = document.getElementById('genreSelect').value;
        const linkCard = document.getElementById('linkCard');
        const badge = document.getElementById('movieCount');

        if (!genre) {
            linkCard.style.display = 'none';
            badge.style.display = 'none';
            document.getElementById('jsonData').value = '';
            return;
        }

        if (!validGenreIds.has(genre)) {
            showStatus('Invalid category', '#fc8181');
            return;
        }

        // Link card update
        linkCard.style.display = 'block';
        document.getElementById('urlMain').textContent =
            `${window.location.origin}/api?genre=${encodeURIComponent(genre)}`;
        document.getElementById('urlShow').textContent =
            `${window.location.origin}/api?genre=${encodeURIComponent(genre)}-show`;

        if (!adminPassword) return;

        showStatus('Loading...', '#f6ad55');
        try {
            const res = await apiFetch(
                `/api?genre=${encodeURIComponent(genre)}&pass=${encodeURIComponent(adminPassword)}`,
                { cache: 'no-store' }
            );

            if (res.status === 429) {
                showStatus('Too many requests. Please wait.', '#fc8181');
                return;
            }
            if (!res.ok) {
                showStatus(`Load failed (${res.status})`, '#fc8181');
                return;
            }

            const data = await res.json();
            document.getElementById('jsonData').value = JSON.stringify(data, null, 2);

            const count = Array.isArray(data) ? data.length : (data && typeof data === 'object' ? Object.keys(data).length : '?');
            badge.textContent = `${count} items`;
            badge.style.display = 'inline-block';

            showStatus(`✅ Loaded — ${count} items`, '#68d391');
            refreshSessionTimer();
        } catch (e) {
            showStatus('Error loading data', '#fc8181');
        }
    }

    // ============================================
    // CHECK SIZE + DURATION
    // ============================================
    async function checkAll() {
        const hdLink = document.getElementById('mHD').value.trim();
        const checkBtn = document.getElementById('checkBtn');
        const resultCard = document.getElementById('checkResult');
        const rSize = document.getElementById('rSize');
        const rDuration = document.getElementById('rDuration');

        if (!hdLink) { alert('Video / Download URL ကို အရင်ထည့်ပါ။'); return; }
        if (!isValidUrl(hdLink)) {
            alert('Valid URL မဟုတ်ပါ။ http:// သို့ https:// ဖြင့်စရပါမည်။');
            return;
        }
        if (!adminPassword) { alert('Login ဝင်ပါ'); return; }

        checkBtn.disabled = true;
        checkBtn.textContent = '⏳ ...';
        resultCard.classList.add('show');
        rSize.className = 'result-value loading';
        rSize.textContent = 'စစ်ဆေးနေသည်...';
        rDuration.className = 'result-value loading';
        rDuration.textContent = 'စစ်ဆေးနေသည်...';

        try {
            const proxyUrl = `/check-size?url=${encodeURIComponent(hdLink)}&type=all&pass=${encodeURIComponent(adminPassword)}`;
            const res = await apiFetch(proxyUrl, { cache: 'no-store' });

            if (res.status === 401) {
                rSize.className = 'result-value fail';
                rSize.textContent = 'Unauthorized';
                rDuration.className = 'result-value fail';
                rDuration.textContent = 'Unauthorized';
                return;
            }

            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }

            const result = await res.json();

            if (result.sizeSuccess && result.size) {
                rSize.className = 'result-value ok';
                rSize.textContent = result.size;
                document.getElementById('mSize').value = result.size;
            } else {
                rSize.className = 'result-value fail';
                rSize.textContent = 'ရယူ၍မရပါ';
            }

            if (result.durationSuccess && result.durationFormatted) {
                rDuration.className = 'result-value ok';
                rDuration.textContent = result.durationFormatted;
                document.getElementById('mTime').value = result.durationFormatted;
            } else {
                rDuration.className = 'result-value fail';
                rDuration.textContent = 'ရယူ၍မရပါ';
            }

            refreshSessionTimer();
        } catch (e) {
            rSize.className = 'result-value fail';
            rSize.textContent = 'Check failed';
            rDuration.className = 'result-value fail';
            rDuration.textContent = 'Check failed';
        } finally {
            checkBtn.disabled = false;
            checkBtn.textContent = '🔍 Check';
        }
    }

    // ============================================
    // ADD TO JSON
    // ============================================
    function addToJson() {
        const title = document.getElementById('mTitle').value.trim();
        if (!title) { alert('Title ထည့်ပါ'); return; }

        // Optional URL validation
        const photo1 = document.getElementById('mPhoto1').value.trim();
        const photo2 = document.getElementById('mPhoto2').value.trim();
        const hd = document.getElementById('mHD').value.trim();

        if (photo1 && !isValidUrl(photo1)) {
            if (!confirm('Photo 1 URL က မမှန်နိုင်ပါ။ ဆက်လုပ်မလား?')) return;
        }
        if (photo2 && !isValidUrl(photo2)) {
            if (!confirm('Photo 2 URL က မမှန်နိုင်ပါ။ ဆက်လုပ်မလား?')) return;
        }
        if (hd && !isValidUrl(hd)) {
            if (!confirm('Video URL က မမှန်နိုင်ပါ။ ဆက်လုပ်မလား?')) return;
        }

        const quality = document.getElementById('mQuality').value.trim() || 'HD';
        const year = document.getElementById('mYear').value.trim() || 'N/A';
        const rawRate = document.getElementById('mRate').value.trim();
        const rate = rawRate || generateRandomRating();

        const tagsRaw = document.getElementById('mTags').value.trim();
        const movie = {
            title,
            photo1,
            photo2,
            description: document.getElementById('mDesc').value.trim() || '',
            rate,
            HD: hd,
            year,
            time: document.getElementById('mTime').value.trim() || '',
            genre: tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
            File_Size: document.getElementById('mSize').value.trim() || '',
            quality
        };

        let data = [];
        const jsonField = document.getElementById('jsonData');
        try {
            data = JSON.parse(jsonField.value || '[]');
            if (!Array.isArray(data)) {
                if (!confirm('လက်ရှိ data က array မဟုတ်ပါ။ Array အသစ်အဖြစ် overwrite လုပ်မလား?')) return;
                data = [];
            }
        } catch (e) {
            alert('JSON ပြင်ဆင်ပါ — JSON မမှန်ကန်ပါ');
            return;
        }

        data.unshift(movie);
        jsonField.value = JSON.stringify(data, null, 2);

        const badge = document.getElementById('movieCount');
        badge.textContent = `${data.length} items`;
        badge.style.display = 'inline-block';

        showStatus(`✅ Added! "${title}" | ${quality} | ${year} | ⭐${rate} — SAVE နှိပ်ပါ`, '#fbd38d');

        // Clear fields
        ['mTitle','mPhoto1','mPhoto2','mHD','mDesc','mRate','mYear',
         'mTime','mQuality','mSize','mTags'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('checkResult').classList.remove('show');

        // Focus back to title for fast entry
        document.getElementById('mTitle').focus();
    }

    function generateRandomRating() {
        const rand = Math.floor(Math.random() * (95 - 65 + 1)) + 65;
        return (rand / 10).toFixed(1);
    }

    // ============================================
    // SAVE ALL
    // ============================================
    async function saveAll() {
        const genre = document.getElementById('genreSelect').value;
        const rawData = document.getElementById('jsonData').value;
        const saveBtn = document.getElementById('saveBtn');

        if (!genre) { alert('Category ရွေးပါ'); return; }
        if (!validGenreIds.has(genre)) { alert('Invalid category'); return; }
        if (!adminPassword) { alert('Password မရှိပါ — ထပ်မံ Login ဝင်ပါ'); return; }

        // JSON validate
        let parsed;
        try {
            parsed = JSON.parse(rawData);
        } catch (e) {
            alert('JSON မမှန်ကန်ပါ — စစ်ဆေးပြီးမှ Save လုပ်ပါ\n\n' + e.message);
            return;
        }

        // Confirmation for safety
        const itemCount = Array.isArray(parsed) ? parsed.length : 1;
        if (!confirm(`"${genre}" category ထဲက ${itemCount} items တွေကို Save လုပ်မလား?`)) {
            return;
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="saving-spinner"></span>Saving...';
        showStatus('Saving...', '#f6ad55');

        try {
            const res = await apiFetch('/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                cache: 'no-store',
                body: JSON.stringify({ genre, data: rawData, password: adminPassword })
            });

            if (res.ok) {
                showStatus('✅ Successfully Saved!', '#68d391');
                refreshSessionTimer();
            } else if (res.status === 401) {
                showStatus('❌ Password မှားနေပါသည်', '#fc8181');
            } else if (res.status === 429) {
                showStatus('⏳ Too many requests. Wait and retry.', '#fc8181');
            } else if (res.status === 413) {
                showStatus('❌ Data too large (max 5MB)', '#fc8181');
            } else {
                showStatus(`❌ Failed (${res.status})`, '#fc8181');
            }
        } catch (e) {
            showStatus('❌ Network error. Please retry.', '#fc8181');
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 Save All Changes';
        }
    }

    // ============================================
    // HELPERS
    // ============================================
    function showStatus(msg, color) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.color = color;
    }

    // Warn before unload if there's unsaved data in editor
    window.addEventListener('beforeunload', (e) => {
        const jsonField = document.getElementById('jsonData');
        if (adminPassword && jsonField && jsonField.value.trim() && jsonField.dataset.dirty === '1') {
            e.preventDefault();
            e.returnValue = '';
        }
    });
    document.addEventListener('input', (e) => {
        if (e.target && e.target.id === 'jsonData') {
            e.target.dataset.dirty = '1';
        }
    });
    // Save လုပ်ပြီးတိုင်း dirty flag clear
    const origShowStatus = showStatus;
    window.__clearDirty = () => {
        const jf = document.getElementById('jsonData');
        if (jf) jf.dataset.dirty = '0';
    };

})();
</script>
