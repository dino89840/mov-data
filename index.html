<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Admin Pro - Dynamic</title>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: #e2e8f0; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: #2d3748; padding: 25px; border-radius: 12px; }
        h2 { text-align: center; color: #63b3ed; }
        .section { background: #3c4858; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #63b3ed; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #4a5568; background: #1a202c; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #38a169; color: white; margin-bottom: 10px; }
        .btn-save { background: #3182ce; color: white; }
        .link-card { background: #2c5282; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; }
        .status { text-align: center; margin-top: 10px; font-weight: bold; }

        /* Video Link Row */
        .video-link-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .video-link-row input { margin-bottom: 0; }

        .btn-check {
            padding: 12px 18px;
            background: #d69e2e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
            width: auto;
        }
        .btn-check:hover { background: #b7791f; }
        .btn-check:disabled { background: #4a5568; cursor: not-allowed; }

        /* Check Result Card */
        .check-result {
            display: none;
            background: #1a202c;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border: 1px solid #4a5568;
            font-size: 13px;
        }
        .check-result.show { display: block; }
        .check-result .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .check-result .result-label { color: #a0aec0; }
        .check-result .result-value { font-weight: bold; }
        .result-value.ok { color: #68d391; }
        .result-value.fail { color: #fc8181; }
        .result-value.loading { color: #f6ad55; }
        .check-divider { border: none; border-top: 1px solid #4a5568; margin: 6px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Movie Data Center</h2>

    <label>Admin Password:</label>
    <input type="password" id="adminPass" placeholder="Enter Password" oninput="loadData()">

    <label>Category ရွေးပါ:</label>
    <select id="genreSelect" onchange="loadData()">
        <option value="">-- ရွေးချယ်ပါ --</option>
    </select>

    <div class="link-card" id="linkCard" style="display:none;">
        <p>Main Raw: <span id="urlMain" style="color:#90cdf4;"></span></p>
        <p>Home Show: <span id="urlShow" style="color:#90cdf4;"></span></p>
    </div>

    <div class="section">
        <h4>+ Add New Movie</h4>
        <input type="text" id="mTitle" placeholder="Title">

        <div class="grid-3">
            <input type="text" id="mPhoto1" placeholder="Photo 1">
            <input type="text" id="mPhoto2" placeholder="Photo 2">
            <!-- Video Link + Check Button -->
            <div class="video-link-row">
                <input type="text" id="mHD" placeholder="Video / Download URL">
                <button class="btn-check" id="checkBtn" onclick="checkAll()">🔍 Check</button>
            </div>
        </div>

        <!-- Check Result Card -->
        <div class="check-result" id="checkResult">
            <div class="result-row">
                <span class="result-label">📦 File Size</span>
                <span class="result-value" id="rSize">—</span>
            </div>
            <hr class="check-divider">
            <div class="result-row">
                <span class="result-label">⏱️ Duration</span>
                <span class="result-value" id="rDuration">—</span>
            </div>
        </div>

        <textarea id="mDesc" rows="4" placeholder="Description"></textarea>
        <div class="grid-3">
            <input type="text" id="mRate" placeholder="Rate">
            <input type="text" id="mYear" placeholder="Year">
            <!-- Time field — auto fill ဖြင့် -->
            <input type="text" id="mTime" placeholder="Time (Auto ထည့်ပေးမည်)">
        </div>
        <div class="grid-3">
            <input type="text" id="mQuality" placeholder="Quality">
            <!-- File Size field — auto fill ဖြင့် -->
            <input type="text" id="mSize" placeholder="File Size (Auto ထည့်ပေးမည်)">
            <input type="text" id="mTags" placeholder="Tags (Action, Sci-fi)">
        </div>
        <button class="btn-add" onclick="addToJson()">Add to Top</button>
    </div>

    <div class="section">
        <h4>Manual Editor</h4>
        <textarea id="jsonData" rows="10"></textarea>
        <button class="btn-save" onclick="saveAll()">Save All Changes</button>
    </div>
    <div id="status" class="status"></div>
</div>

<script>
    const categories = [
        { id: "jav-mmsub", name: "Jav Mmsub" },
        { id: "jav-nosub", name: "Jav Nosub" },
        { id: "usa-mmsub", name: "USA Mmsub" },
        { id: "usa-nosub", name: "USA Nosub" },
        { id: "chinese-mmsub", name: "Chinese Mmsub" },
        { id: "chinese-nosub", name: "Chinese Nosub" },
        { id: "yoteshin", name: "Yoteshin" },
        { id: "slider-movie", name: "🎞️ Slider Movie (Auto)" },
        { id: "jvmmsub-ads", name: "Jvmmsub Ads" },
        { id: "jvnosub-ads", name: "jvnosub Ads" },
        { id: "usammsub-ads", name: "Usammsub Ads" },
        { id: "usanosub-ads", name: "Usanosub Ads" },
        { id: "chinesemmsub-ads", name: "Chinesemmsub Ads" },
        { id: "chinesenosub-ads", name: "Chinesenosub Ads" },
        { id: "request-movie", name: "Request Movie" },
        { id: "telegram-channel", name: "Telegram Channel" },
        { id: "top-ads", name: "Top Ads" },
        { id: "middle-ads", name: "Middle Ads" },
        { id: "Button-ads", name: "Button Ads" },
        { id: "download-ads", name: "Download Ads" },
        { id: "Noti-ads", name: "Noti Ads" },
        { id: "Moviedetail-ads", name: "Movie Detail Ads" },
        { id: "Moviedetail-topads", name: "Movie Detail Top Ads" },
        { id: "Moviedetail-buttonads", name: "Movie Detail Button Ads" },
        { id: "Moviedetail-firsttopads", name: "Normalmovie First Top Ads" },
        { id: "Yoteshin-allads", name: "Yoteshin All Detail Ads" },
        { id: "ads-notice", name: "Ads & Notice" }
    ];

    const select = document.getElementById('genreSelect');
    categories.forEach(cat => {
        let opt = document.createElement('option');
        opt.value = cat.id;
        opt.innerHTML = cat.name;
        select.appendChild(opt);
    });

    async function loadData() {
        const genre = document.getElementById('genreSelect').value;
        const pass = document.getElementById('adminPass').value;
        if (!genre) { document.getElementById('linkCard').style.display = "none"; return; }

        document.getElementById('linkCard').style.display = "block";
        document.getElementById('urlMain').innerText = `${window.location.origin}/api?genre=${genre}`;
        document.getElementById('urlShow').innerText = `${window.location.origin}/api?genre=${genre}-show`;

        if (!pass) return;
        try {
            const res = await fetch(`${window.location.origin}/api?genre=${genre}&pass=${pass}`);
            if (res.ok) {
                const data = await res.json();
                document.getElementById('jsonData').value = JSON.stringify(data, null, 2);
                showStatus("Data Loaded", "lime");
            }
        } catch (e) { showStatus("Error", "red"); }
    }

    // ===================================================
    // MAIN CHECK FUNCTION — Size + Duration တစ်ပြိုင်နက်
    // ===================================================
    async function checkAll() {
        const hdLink = document.getElementById('mHD').value.trim();
        const checkBtn = document.getElementById('checkBtn');
        const resultCard = document.getElementById('checkResult');
        const rSize = document.getElementById('rSize');
        const rDuration = document.getElementById('rDuration');

        if (!hdLink) {
            alert('Video / Download URL ကို အရင်ထည့်ပါ။');
            return;
        }
        if (!hdLink.startsWith('http://') && !hdLink.startsWith('https://')) {
            alert('Valid URL မဟုတ်ပါ။ http:// သို့ https:// ဖြင့်စရပါမည်။');
            return;
        }

        // Loading UI
        checkBtn.disabled = true;
        checkBtn.textContent = '⏳ ...';
        resultCard.classList.add('show');
        rSize.className = 'result-value loading';
        rSize.textContent = 'စစ်ဆေးနေသည်...';
        rDuration.className = 'result-value loading';
        rDuration.textContent = 'စစ်ဆေးနေသည်...';

        try {
            // Size + Duration တစ်ပြိုင်နက် စစ်မယ်
            const proxyUrl = `${window.location.origin}/check-size?url=${encodeURIComponent(hdLink)}&type=all`;
            const res = await fetch(proxyUrl);
            const result = await res.json();

            // --- File Size ---
            if (result.sizeSuccess && result.size) {
                rSize.className = 'result-value ok';
                rSize.textContent = result.size;
                document.getElementById('mSize').value = result.size; // auto fill
            } else {
                rSize.className = 'result-value fail';
                rSize.textContent = 'ရယူ၍မရပါ';
            }

            // --- Duration ---
            if (result.durationSuccess && result.durationFormatted) {
                rDuration.className = 'result-value ok';
                rDuration.textContent = result.durationFormatted;
                document.getElementById('mTime').value = result.durationFormatted; // auto fill
            } else {
                rDuration.className = 'result-value fail';
                rDuration.textContent = 'ရယူ၍မရပါ (MP4 moov atom မတွေ့)';
            }

        } catch (e) {
            rSize.className = 'result-value fail';
            rSize.textContent = 'Error: ' + e.message;
            rDuration.className = 'result-value fail';
            rDuration.textContent = 'Error';
        } finally {
            checkBtn.disabled = false;
            checkBtn.textContent = '🔍 Check';
        }
    }

    // Enter key support
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('mHD').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); checkAll(); }
        });
    });
    // ===================================================

    function addToJson() {
        const movie = {
            title: document.getElementById('mTitle').value || "",
            photo1: document.getElementById('mPhoto1').value || "",
            photo2: document.getElementById('mPhoto2').value || "",
            description: document.getElementById('mDesc').value || "",
            rate: document.getElementById('mRate').value || "",
            HD: document.getElementById('mHD').value || "",
            year: document.getElementById('mYear').value || "",
            time: document.getElementById('mTime').value || "",
            genre: document.getElementById('mTags').value
                ? document.getElementById('mTags').value.split(',').map(s => s.trim())
                : [],
            File_Size: document.getElementById('mSize').value || "",
            quality: document.getElementById('mQuality').value || ""
        };

        let data = JSON.parse(document.getElementById('jsonData').value || "[]");
        data.unshift(movie);
        document.getElementById('jsonData').value = JSON.stringify(data, null, 2);
        showStatus("Added! Don't forget to SAVE.", "yellow");

        // Clear all + hide result card
        ['mTitle','mPhoto1','mPhoto2','mHD','mDesc','mRate','mYear',
         'mTime','mQuality','mSize','mTags'].forEach(id => {
            document.getElementById(id).value = "";
        });
        document.getElementById('checkResult').classList.remove('show');
    }

    async function saveAll() {
        const genre = document.getElementById('genreSelect').value;
        const data = document.getElementById('jsonData').value;
        const password = document.getElementById('adminPass').value;
        if (!genre || !password) { alert("Need Category and Password"); return; }

        showStatus("Saving...", "orange");
        const res = await fetch('/update', {
            method: 'POST',
            body: JSON.stringify({ genre, data, password })
        });
        if (res.ok) showStatus("Successfully Updated! ✅", "lime");
        else showStatus("Failed!", "red");
    }

    function showStatus(t, c) {
        const s = document.getElementById('status');
        s.innerText = t; s.style.color = c;
    }
</script>
</body>
</html>
