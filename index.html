<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Data Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        
        .section { background: #f8f9fa; padding: 20px; border-radius: 10px; border-left: 5px solid #1a73e8; margin-bottom: 25px; }
        h4 { margin-top: 0; color: #1a73e8; }
        
        label { font-weight: bold; display: block; margin: 10px 0 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-add { background: #28a745; color: white; }
        .btn-add:hover { background: #218838; }
        .btn-save { background: #1a73e8; color: white; }
        
        .status { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 8px; }
        
        /* Copy Section Style */
        .link-info { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #c2d7ff; }
        .url-text { font-size: 13px; color: #1a73e8; font-weight: bold; word-break: break-all; margin-right: 10px; }
        .btn-copy { width: auto; padding: 8px 15px; background: #6c757d; font-size: 12px; margin-top: 0; }
        .btn-copy:active { background: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Movie Data Center</h2>
    
    <label>စီမံမည့် Category (ရွေးပါ သို့မဟုတ် အသစ်ရိုက်ထည့်ပါ):</label>
    <input list="genre-list" id="genre" placeholder="ဥပမာ- jav-mmsub" onchange="loadData()">
    <datalist id="genre-list">
        <option value="jav-mmsub"><option value="jav-nosub">
        <option value="usa-mmsub"><option value="usa-nosub">
        <option value="chinese-mmsub"><option value="chinese-nosub">
        <option value="yoteshin"><option value="ads-notice">
    </datalist>

    <div class="link-info">
        <div>
            <strong>Raw Link:</strong><br>
            <span id="currentUrl">Category အရင်ရွေးပါ...</span>
        </div>
        <button id="copyBtn" class="btn-copy" onclick="copyLink()" style="display:none;">Copy Link</button>
    </div>

    <div class="section">
        <h4>+ ဇာတ်ကားအသစ်ထည့်ရန်</h4>
        <label>Title (ဇာတ်ကားအမည်):</label>
        <input type="text" id="title" placeholder="Past Lives">

        <div class="grid">
            <div><label>Photo 1 (Poster):</label><input type="text" id="photo1" placeholder="URL"></div>
            <div><label>Photo 2 (Landscape):</label><input type="text" id="photo2" placeholder="URL"></div>
            <div><label>Video Link (HD):</label><input type="text" id="HD" placeholder="URL"></div>
        </div>

        <label>Description (ဇာတ်လမ်းအညွှန်း):</label>
        <textarea id="description" rows="5"></textarea>

        <div class="grid">
            <div><label>Rating:</label><input type="text" id="rate" placeholder="7.8"></div>
            <div><label>Year:</label><input type="text" id="year" placeholder="2023"></div>
            <div><label>Time (Min):</label><input type="text" id="time" placeholder="106"></div>
        </div>
        <button class="btn-add" onclick="addNewMovie()">Add To List</button>
    </div>

    <div class="section">
        <h4>Manual JSON Edit / Ads</h4>
        <textarea id="jsonData" rows="12"></textarea>
        <button class="btn-save" onclick="saveFullData()">Save All Changes</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    let fullUrl = "";

    async function loadData() {
        const genre = document.getElementById('genre').value.trim();
        if(!genre) return;

        fullUrl = `${window.location.origin}/api?genre=${genre}`;
        document.getElementById('currentUrl').innerText = fullUrl;
        document.getElementById('copyBtn').style.display = "block";
        document.getElementById('copyBtn').innerText = "Copy Link";

        try {
            const res = await fetch(`/api?genre=${genre}`);
            const data = await res.json();
            document.getElementById('jsonData').value = JSON.stringify(data, null, 2);
            showStatus("Data loaded!", "green");
        } catch (e) {
            document.getElementById('jsonData').value = "[]";
            showStatus("New Category detected.", "blue");
        }
    }

    function copyLink() {
        if(!fullUrl) return;
        navigator.clipboard.writeText(fullUrl);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied! ✅";
        setTimeout(() => { btn.innerText = "Copy Link"; }, 2000);
    }

    async function addNewMovie() {
        const genre = document.getElementById('genre').value.trim();
        if(!genre) { alert("Category အရင်ရွေးပါ"); return; }

        const movie = {
            title: document.getElementById('title').value,
            photo1: document.getElementById('photo1').value,
            photo2: document.getElementById('photo2').value,
            description: document.getElementById('description').value,
            rate: document.getElementById('rate').value || undefined,
            HD: document.getElementById('HD').value,
            year: document.getElementById('year').value || undefined,
            time: document.getElementById('time').value || undefined
        };

        let currentData = JSON.parse(document.getElementById('jsonData').value || "[]");
        currentData.push(movie);
        document.getElementById('jsonData').value = JSON.stringify(currentData, null, 2);
        await saveFullData();
        clearForm();
    }

    async function saveFullData() {
        const genre = document.getElementById('genre').value.trim();
        const data = document.getElementById('jsonData').value;
        if(!genre) { alert("Category ရွေးပါ"); return; }

        showStatus("Saving...", "orange");
        const res = await fetch('/update', {
            method: 'POST',
            body: JSON.stringify({ genre, data })
        });
        if(res.ok) showStatus("Successfully Saved! ✅", "green");
        else showStatus("Error Saving!", "red");
    }

    function clearForm() {
        ['title', 'photo1', 'photo2', 'HD', 'description', 'rate', 'year', 'time'].forEach(id => document.getElementById(id).value = "");
    }

    function showStatus(text, color) {
        const s = document.getElementById('status');
        s.innerText = text; s.style.color = color;
    }
</script>

</body>
</html>
