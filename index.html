<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Data Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        .section { background: #f8f9fa; padding: 20px; border-radius: 10px; border-left: 5px solid #1a73e8; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin: 10px 0 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-add { background: #28a745; color: white; }
        .btn-save { background: #1a73e8; color: white; }
        .link-info { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #c2d7ff; }
        .btn-copy { width: auto; padding: 8px 15px; background: #6c757d; font-size: 12px; margin-top: 0; color: white; }
        .status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Movie Data Center</h2>
    
    <label>စီမံမည့် Category ကိုရွေးပါ:</label>
    <select id="genre" onchange="loadData()">
        <option value="">-- ရွေးချယ်ပါ --</option>
        <option value="jav-mmsub">Jav Mmsub</option>
        <option value="jav-nosub">Jav Nosub</option>
        <option value="usa-mmsub">USA Mmsub</option>
        <option value="usa-nosub">USA Nosub</option>
        <option value="chinese-mmsub">Chinese Mmsub</option>
        <option value="chinese-nosub">Chinese Nosub</option>
        <option value="yoteshin">Yoteshin</option>
        <option value="ads-notice">Ads & Notice</option>
    </select>

    <label>Category အသစ်တိုးလိုပါက ရိုက်ထည့်ပါ:</label>
    <input type="text" id="custom-genre" placeholder="ဥပမာ- action-2026" oninput="loadData()">

    <div class="link-info">
        <div>
            <strong>Raw Link:</strong><br>
            <span id="currentUrl">Category အရင်ရွေးပါ...</span>
        </div>
        <button id="copyBtn" class="btn-copy" onclick="copyLink()" style="display:none;">Copy Link</button>
    </div>

    <div class="section">
        <h4>+ ဇာတ်ကားအသစ်ထည့်ရန်</h4>
        <input type="text" id="title" placeholder="Title">
        <div class="grid">
            <input type="text" id="photo1" placeholder="Photo 1 (URL)">
            <input type="text" id="photo2" placeholder="Photo 2 (URL)">
            <input type="text" id="HD" placeholder="Video Link (URL)">
        </div>
        <textarea id="description" rows="5" placeholder="Description"></textarea>
        <div class="grid">
            <input type="text" id="rate" placeholder="Rating (e.g. 7.8)">
            <input type="text" id="year" placeholder="Year (e.g. 2023)">
            <input type="text" id="time" placeholder="Time (e.g. 106)">
        </div>
        <button class="btn-add" onclick="addNewMovie()">Add To List</button>
    </div>

    <div class="section">
        <h4>Manual JSON Edit</h4>
        <textarea id="jsonData" rows="10"></textarea>
        <button class="btn-save" onclick="saveFullData()">Save All Changes</button>
    </div>
    <div id="status" class="status"></div>
</div>

<script>
    let fullUrl = "";

    async function loadData() {
        const selectGenre = document.getElementById('genre').value;
        const customGenre = document.getElementById('custom-genre').value.trim();
        const genre = customGenre || selectGenre;

        if(!genre) return;

        fullUrl = `${window.location.origin}/api?genre=${genre}`;
        document.getElementById('currentUrl').innerText = fullUrl;
        document.getElementById('copyBtn').style.display = "block";

        try {
            const res = await fetch(`/api?genre=${genre}`);
            const data = await res.json();
            document.getElementById('jsonData').value = JSON.stringify(data, null, 2);
        } catch (e) {
            document.getElementById('jsonData').value = "[]";
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(fullUrl);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied! ✅";
        setTimeout(() => { btn.innerText = "Copy Link"; }, 2000);
    }

    async function addNewMovie() {
        const selectGenre = document.getElementById('genre').value;
        const customGenre = document.getElementById('custom-genre').value.trim();
        const genre = customGenre || selectGenre;

        if(!genre) { alert("Category ရွေးပါ"); return; }

        const movie = {
            title: document.getElementById('title').value,
            photo1: document.getElementById('photo1').value,
            photo2: document.getElementById('photo2').value,
            description: document.getElementById('description').value,
            rate: document.getElementById('rate').value || undefined,
            HD: document.getElementById('HD').value,
            year: document.getElementById('year').value || undefined,
            time: document.getElementById('time').value || undefined
        };

        let currentData = JSON.parse(document.getElementById('jsonData').value || "[]");
        currentData.push(movie);
        document.getElementById('jsonData').value = JSON.stringify(currentData, null, 2);
        await saveFullData();
        clearForm();
    }

    async function saveFullData() {
        const selectGenre = document.getElementById('genre').value;
        const customGenre = document.getElementById('custom-genre').value.trim();
        const genre = customGenre || selectGenre;

        const data = document.getElementById('jsonData').value;
        const res = await fetch('/update', {
            method: 'POST',
            body: JSON.stringify({ genre, data })
        });
        if(res.ok) showStatus("Saved! ✅", "green");
    }

    function clearForm() {
        ['title', 'photo1', 'photo2', 'HD', 'description', 'rate', 'year', 'time'].forEach(id => document.getElementById(id).value = "");
    }

    function showStatus(text, color) {
        const s = document.getElementById('status');
        s.innerText = text; s.style.color = color;
    }
</script>
</body>
</html>
